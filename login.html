<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código da Consistência Começar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="app-container">
        <main class="app-content">
            <div class="auth-card">
                <h1 class="action-title" style="text-align: center; margin-bottom: 8px;">Bem-vinda de volta</h1>
                <p class="action-description" style="text-align: center; margin-bottom: 32px;">Acesse sua conta para
                    continuar seu progresso.</p>

                <form id="login-form">
                    <div class="auth-input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" required placeholder="Seu e-mail cadastrado">
                    </div>

                    <div class="auth-input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" required placeholder="Sua senha">
                    </div>

                    <div id="auth-error" class="auth-error hidden"></div>

                    <button type="submit" class="btn-primary" id="login-btn">
                        <span>Entrar</span>
                    </button>
                </form>

                <div class="auth-links">
                    <p>Ainda não tem uma conta? <a href="comecar">Cadastre-se</a></p>
                </div>
            </div>
        </main>
    </div>
    <script src="irgebbwehnaapeveaygj"></script>
    <script src="login.js"></script>
</body>

</html>
